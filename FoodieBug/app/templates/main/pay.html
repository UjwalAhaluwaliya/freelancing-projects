{% extends "base.html" %}

{% block content %}
<div class="row pt-4 justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow-lg p-5 border-0 rounded-4">
            <h2 class="display-6 fw-bold text-dark mb-4 mt-3">Demo Payment 💳</h2>
            <p class="text-muted lead mb-5 px-3">This is a simulated payment gateway. Your total is <span class="fw-bold text-success">₹{{ "%.2f"|format(order.total_amount) }}</span>.</p>
            
            <form action="{{ url_for('main.pay', order_id=order.id) }}" method="POST">
                <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm py-3 px-5 custom-hover mb-4 transition-all">
                   Pay Now & Complete Order
                </button>
            </form>
            
            <p class="text-muted mb-0 small"><i class="fw-medium">Clicking Pay will mark your order as "PAID" and redirect you to your order history.</i></p>
        </div>
    </div>
</div>
{% endblock %}
