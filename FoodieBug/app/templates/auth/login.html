{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold text-primary mb-4">Welcome Back!</h3>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">Email address</label>
                        <input type="email" class="form-control form-control-lg rounded-3" name="email" required placeholder="Enter your email">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" class="form-control form-control-lg rounded-3" name="password" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill fw-bold shadow-sm">Login to FoodieBug</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
