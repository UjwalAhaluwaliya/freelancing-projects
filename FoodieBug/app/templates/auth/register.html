{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold text-primary mb-4">Create an Account</h3>
                <form action="{{ url_for('auth.register') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">Full Name</label>
                        <input type="text" class="form-control form-control-lg rounded-3" name="name" required placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Email address</label>
                        <input type="email" class="form-control form-control-lg rounded-3" name="email" required placeholder="name@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" class="form-control form-control-lg rounded-3" name="password" required placeholder="Choose a strong password">
                    </div>
                    <!-- Role selection for demonstration purposes (Customer or RestaurantAdmin) -->
                    <div class="mb-4">
                        <label class="form-label text-muted">I am a...</label>
                        <select class="form-select form-select-lg rounded-3" name="role" required>
                            <option value="Customer">Hungry Customer</option>
                            <option value="RestaurantAdmin">Restaurant Owner</option>
                            <option value="DeliveryPartner">Delivery Partner</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill fw-bold shadow-sm">Join FoodieBug</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
